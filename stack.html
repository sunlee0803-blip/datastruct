<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파이썬 자료구조 시각화 - 스택 (Stack)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { display: flex; height: 100vh; margin: 0; font-family: 'Malgun Gothic', sans-serif; background-color: #f5f6fa; }
        
        /* 왼쪽 패널 (컨트롤 및 히스토리 로그) */
        .left-container {
            width: 35%; background-color: #1a1e26; color: white; padding: 20px;
            display: flex; flex-direction: column; gap: 15px; box-shadow: 5px 0 15px rgba(0,0,0,0.1);
        }
        .panel-title { font-size: 22px; font-weight: bold; color: #61afef; }
        
        .control-box { background-color: #2e3440; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; }
        .control-label { font-size: 14px; color: #d8dee9; font-weight: bold; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        .input-box {
            flex: 1; background-color: #3b4252; color: #a3be8c; border: 2px solid #4c566a;
            padding: 10px; font-size: 16px; font-family: monospace; outline: none; border-radius: 6px; text-align: center;
        }
        .input-box:focus { border-color: #88c0d0; }
        
        button { width: 100%; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s; }
        #pushBtn { background-color: #a3be8c; color: #2e3440; }
        #pushBtn:hover { background-color: #8fbcbb; }
        #popBtn { background-color: #bf616a; color: white; }
        #popBtn:hover { background-color: #ab525a; }

        .code-box {
            flex: 1; min-height: 150px; padding: 20px; background-color: #21252b; border-radius: 8px;
            font-family: 'Consolas', monospace; font-size: 16px; line-height: 1.8; border: 1px solid #3e4452; overflow-y: auto;
        }
        .code-line { margin-bottom: 4px; white-space: pre-wrap; }
        .comment { color: #6a9955; } .variable { color: #e06c75; } .bracket { color: #abb2bf; } .method { color: #dcdcaa; } .string { color: #98c379; } .number { color: #d19a66; }

        /* 오른쪽 패널 (스택 시각화 공간) */
        .right-container { width: 65%; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .section-title { font-size: 24px; font-weight: bold; color: #1a1e26; margin-bottom: 30px; }
        
        /* 스택 통(원통 모양 바구니) */
        .stack-cylinder {
            width: 160px; height: 420px; border: 4px solid #4b7bec; border-top: none;
            background-color: white; border-radius: 0 0 16px 16px; display: flex;
            flex-direction: column-reverse; align-items: center; padding: 15px; gap: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); position: relative;
            /* 사선 탈출 효과를 온전히 보이기 위해 원통 밖으로 나가는 연출 허용 */
        }
        
        .stack-cylinder::before {
            content: "바닥 (Bottom)"; position: absolute; bottom: -25px; font-size: 12px; color: #7f8c8d; font-weight: bold;
        }
        .stack-cylinder::after {
            content: "입구 (Top)"; position: absolute; top: -25px; font-size: 12px; color: #7f8c8d; font-weight: bold;
        }

        /* 기본 상자 */
        .stack-block {
            width: 120px; height: 55px; background-color: #4b7bec; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 6px rgba(75, 123, 236, 0.3);
            position: relative; transition: transform 0.2s;
        }
        
        /* 최상단 상자 (보라색) */
        .stack-block.top-block { background-color: #a55eea; box-shadow: 0 4px 10px rgba(165, 94, 234, 0.4); }
        
        /* 새로 추가된 상자 낙하 애니메이션 */
        .stack-block.new-entry {
            animation: fallIn 0.3s ease-out forwards;
        }

        /* [수정 핵심] 제거되는 상자 추출 애니메이션 */
        .stack-block.popping-out {
            background-color: #bf616a !important;
            box-shadow: 0 4px 12px rgba(191, 97, 106, 0.5) !important;
            animation: riseUp 0.4s ease-in forwards;
            z-index: 10;
        }
        
        .top-pointer { position: absolute; left: -85px; color: #a55eea; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .empty-msg { font-style: italic; color: #aaa; font-size: 18px; margin: auto; text-align: center; }

        /* 들어올 때 (위에서 아래로) */
        @keyframes fallIn {
            from { transform: translateY(-300px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* [수정 핵심] 나갈 때 (현재 쌓인 높이에서 입구 위쪽으로 발사되며 소멸) */
        @keyframes riseUp {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-250px); opacity: 0; scale: 0.8; }
        }
    </style>
</head>
<body>

    <div class="left-container">
        <div class="panel-title">🕹️ 스택 제어 & 코드 로그</div>
        
        <div class="control-box">
            <div class="control-label">1. 스택에 데이터 넣기 (Push / append)</div>
            <div class="input-row">
                <input type="text" class="input-box" id="stackInput" placeholder="값 입력">
                <button id="pushBtn" style="width:120px;">append()</button>
            </div>
        </div>

        <div class="control-box">
            <div class="control-label">2. 최상단 데이터 꺼내기 (Pop)</div>
            <button id="popBtn">pop() 실행</button>
        </div>

        <div class="code-box" id="codeLog">
            <div class="code-line"><span class="variable">stack</span> = <span class="bracket">[ ]</span></div>
        </div>
    </div>

    <div class="right-container">
        <div class="section-title">📥 자료구조 스택 (Stack) 시각화</div>
        
        <div class="stack-cylinder" id="stackCylinder">
            <div class="empty-msg">스택이 비어 있습니다.<br>값을 append 해보세요!</div>
        </div>
    </div>

    <script>
        var stackData = [];
        var lastAddedIndex = -1;
        var isPopping = false; // 중복 클릭 및 애니메이션 겹침 방지 플래그

        var stackInput = document.getElementById("stackInput");
        var pushBtn = document.getElementById("pushBtn");
        var popBtn = document.getElementById("popBtn");
        var stackCylinder = document.getElementById("stackCylinder");
        var codeLog = document.getElementById("codeLog");

        stackInput.addEventListener("keydown", function(e) { if (e.key === "Enter" && !isPopping) pushAction(); });
        pushBtn.addEventListener("click", function() { if (!isPopping) pushAction(); });
        popBtn.addEventListener("click", function() { if (!isPopping) popAction(); });

        function pushAction() {
            var value = stackInput.value.trim();
            if (value === "") { alert("스택에 넣을 값을 입력해 주세요."); return; }
            
            if (stackData.length >= 6) {
                alert("스택이 가득 찼습니다! (Stack Overflow 방지)");
                return;
            }

            var displayValue = isNaN(value) ? '"' + value + '"' : value;
            var valueClass = isNaN(value) ? 'string' : 'number';

            logCode('<span class="variable">stack</span>.<span class="method">append</span><span class="bracket">(</span><span class="' + valueClass + '">' + displayValue + '</span><span class="bracket">)</span>');
            
            stackData.push(value);
            lastAddedIndex = stackData.length - 1;
            renderStack();
            
            stackInput.value = "";
            stackInput.focus();
        }

        // [수정 핵심] Pop 애니메이션 시차 구동 로직
        function popAction() {
            if (stackData.length === 0) {
                logCode('<span class="variable">stack</span>.<span class="method">pop</span><span class="bracket">()</span>');
                logCode('<span class="comment"># IndexError: pop from empty list</span>');
                alert("스택이 이미 비어 있어 pop할 수 없습니다! (Stack Underflow)");
                return;
            }

            isPopping = true;
            logCode('<span class="variable">stack</span>.<span class="method">pop</span><span class="bracket">()</span>');

            // 1. 화면에 있는 최상단 상자 요소를 즉시 찾아냅니다.
            var blocks = stackCylinder.getElementsByClassName('stack-block');
            var topBlock = blocks[blocks.length - 1]; // 맨 위 블록

            if (topBlock) {
                // 2. 해당 상자에만 붉은색 변경 및 위로 솟구치는 CSS 클래스 장착
                topBlock.classList.add('popping-out');
            }

            // 3. 애니메이션 시간(0.4초) 동안 위로 올라가는 모습을 보여준 뒤, 실제로 데이터 배열에서 제거하고 화면 갱신
            setTimeout(function() {
                stackData.pop();
                lastAddedIndex = -1;
                renderStack();
                isPopping = false; // 플래그 해제
            }, 380); 
        }

        function logCode(htmlContent) {
            var newLine = document.createElement("div");
            newLine.className = "code-line";
            newLine.innerHTML = htmlContent;
            codeLog.appendChild(newLine);
            codeLog.scrollTop = codeLog.scrollHeight;
        }

        function renderStack() {
            if (stackData.length === 0) {
                stackCylinder.innerHTML = '<div class="empty-msg">스택이 비어 있습니다.<br>값을 append 해보세요!</div>';
                return;
            }

            var stackHtml = "";
            for (var i = 0; i < stackData.length; i++) {
                var isTop = (i === stackData.length - 1);
                var topPointerHtml = isTop ? '<div class="top-pointer">👉 Top [' + i + ']</div>' : '';
                
                var blockClasses = ['stack-block'];
                if (isTop) blockClasses.push('top-block');
                if (i === lastAddedIndex) blockClasses.push('new-entry');

                stackHtml += '<div class="' + blockClasses.join(' ') + '">' +
                             topPointerHtml +
                             '<div>' + stackData[i] + '</div>' +
                             '</div>';
            }
            stackCylinder.innerHTML = stackHtml;
        }
    </script>
</body>
</html>
