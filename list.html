<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파이썬 리스트 vs 자료구조 연결 리스트 비교 (최종 수정)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { display: flex; height: 100vh; margin: 0; font-family: 'Malgun Gothic', sans-serif; background-color: #f5f6fa; }
        
        /* 왼쪽 패널 (컨트롤 및 히스토리 로그) */
        .left-container {
            width: 35%; background-color: #1a1e26; color: white; padding: 20px;
            display: flex; flex-direction: column; gap: 12px; box-shadow: 5px 0 15px rgba(0,0,0,0.1);
        }
        .panel-title { font-size: 22px; font-weight: bold; color: #61afef; }
        
        .control-box { background-color: #2e3440; padding: 12px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; }
        .control-label { font-size: 13px; color: #d8dee9; font-weight: bold; }
        .input-row { display: flex; gap: 8px; align-items: center; }
        .input-box {
            flex: 1; background-color: #3b4252; color: #a3be8c; border: 2px solid #4c566a;
            padding: 8px; font-size: 15px; font-family: monospace; outline: none; border-radius: 6px; text-align: center;
        }
        .input-box:focus { border-color: #88c0d0; }
        .input-short { width: 70px; flex: none; }
        
        button { width: 100%; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; }
        #appendBtn { background-color: #a3be8c; color: #2e3440; }
        #appendBtn:hover { background-color: #8fbcbb; }
        #insertBtn { background-color: #ebcb8b; color: #2e3440; }
        #insertBtn:hover { background-color: #e5b96a; }
        #removeBtn { background-color: #d08770; color: white; }
        #removeBtn:hover { background-color: #c17760; }
        #popBtn { background-color: #bf616a; color: white; }
        #popBtn:hover { background-color: #ab525a; }

        .code-box {
            flex: 1; min-height: 120px; padding: 15px; background-color: #21252b; border-radius: 8px;
            font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.6; border: 1px solid #3e4452; overflow-y: auto;
        }
        .code-line { margin-bottom: 4px; white-space: pre-wrap; }
        .comment { color: #6a9955; } .variable { color: #e06c75; } .bracket { color: #abb2bf; } .method { color: #dcdcaa; } .string { color: #98c379; } .number { color: #d19a66; }

        /* 오른쪽 패널 */
        .right-container { width: 65%; padding: 30px; display: flex; flex-direction: column; gap: 25px; overflow-y: auto; }
        .section-title { font-size: 20px; font-weight: bold; color: #1a1e26; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .badge { font-size: 12px; padding: 4px 8px; border-radius: 12px; color: white; font-weight: normal; }

        .visual-wrapper { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); min-height: 160px; display: flex; align-items: center; overflow-x: auto; }
        .list-outer-container { display: flex; flex-direction: column; position: relative; width: 100%; min-height: 260px; justify-content: flex-start; padding-top: 10px; }
        .empty-msg { font-style: italic; color: #aaa; font-size: 16px; margin: auto; }
        
        /* 1. 파이썬 리스트 스타일 */
        .array-content { display: flex; gap: 2px; background-color: #ccc; padding: 2px; border-radius: 6px; }
        .array-item { display: flex; flex-direction: column; align-items: center; background-color: #f5f6fa; padding: 10px 5px; }
        .array-box { width: 70px; height: 70px; background-color: #4b7bec; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; border-radius: 4px; }
        .array-idx { font-family: monospace; color: #555; font-size: 14px; margin-top: 6px; }

        /* 2. 연결 리스트 레이아웃 */
        .list-row-main { display: flex; align-items: center; height: 90px; }
        .list-row-inserted { display: flex; align-items: center; height: 130px; padding-top: 30px; }
        
        .list-node { display: flex; border: 2px solid #a55eea; border-radius: 6px; overflow: hidden; background-color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .list-node.inserted-node { border-color: #ff7675; animation: insertPop 0.3s ease-out; }
        .node-data { width: 55px; height: 60px; background-color: #a55eea; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; }
        .list-node.inserted-node .node-data { background-color: #ff7675; }
        .node-next { width: 45px; height: 60px; background-color: #f1f2f6; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; border-left: 2px solid #a55eea; font-family: monospace; }
        .list-node.inserted-node .node-next { border-left-color: #ff7675; }
        
        /* 화살표 기본 크기 및 세팅 */
        .arrow { font-size: 24px; color: #a55eea; font-weight: bold; display: flex; align-items: center; justify-content: center; width: 90px; }
        .arrow.inserted-flat-arrow { color: #ff7675; } /* 아래층 노드끼리의 완벽한 수평 화살표 색상 */
        .head-badge { background-color: #2d3436; color: white; padding: 2px 4px; font-size: 10px; border-radius: 4px; margin-bottom: 2px; font-weight: bold; }
        
        .arrow-box-down { font-size: 22px; color: #ff7675; font-weight: bold; width: 90px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .arrow-box-up { font-size: 22px; color: #a55eea; font-weight: bold; width: 90px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .arrow-text { font-size: 11px; color: #666; font-family: monospace; margin-bottom: -1px; letter-spacing: 1px; }

        @keyframes insertPop { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="left-container">
        <div class="panel-title">🕹️ 통합 제어 & 코드 로그</div>
        
        <div class="control-box">
            <div class="control-label">1. 맨 뒤에 붙이기 (Append)</div>
            <div class="input-row">
                <input type="text" class="input-box" id="appendInput" placeholder="값 입력">
                <button id="appendBtn" style="width:120px;">append()</button>
            </div>
        </div>

        <div class="control-box">
            <div class="control-label" id="insertLabel">2. 원하는 위치에 끼워넣기 (Insert)</div>
            <div class="input-row">
                <input type="number" class="input-box input-short" id="insertIdx" min="0" value="0">
                <input type="text" class="input-box" id="insertInput" placeholder="값 입력">
                <button id="insertBtn" style="width:120px;">insert()</button>
            </div>
        </div>

        <div class="control-box">
            <div class="control-label">3. 값 찾아서 지우기 (Remove)</div>
            <div class="input-row">
                <input type="text" class="input-box" id="removeInput" placeholder="지울 값">
                <button id="removeBtn" style="width:120px;">remove()</button>
            </div>
        </div>

        <div class="control-box">
            <div class="control-label">4. 맨 뒤 자르기 (Pop)</div>
            <button id="popBtn">pop() 실행</button>
        </div>

        <div class="code-box" id="codeLog">
            <div class="code-line"><span class="variable">my_list</span> = <span class="bracket">[ ]</span></div>
        </div>
    </div>

    <div class="right-container">
        <div>
            <div class="section-title">📦 1. 파이썬 리스트 <span class="badge" style="background:#f39c12; color:black;">물리적 구조: 동적 배열</span></div>
            <div class="visual-wrapper" id="arrayWrapper">
                <div class="empty-msg">데이터가 없습니다.</div>
            </div>
        </div>

        <div>
            <div class="section-title">🔗 2. 자료구조 연결 리스트 <span class="badge" style="background:#a55eea;">물리적 구조: 연결 리스트 (Linked List)</span></div>
            <div class="visual-wrapper" id="listWrapper" style="min-height: 310px;">
                <div class="empty-msg">데이터가 없습니다.</div>
            </div>
        </div>
    </div>

    <script>
        var listData = [];

        var appendInput = document.getElementById("appendInput");
        var insertIdx = document.getElementById("insertIdx");
        var insertInput = document.getElementById("insertInput");
        var removeInput = document.getElementById("removeInput");
        var insertLabel = document.getElementById("insertLabel");
        
        var appendBtn = document.getElementById("appendBtn");
        var insertBtn = document.getElementById("insertBtn");
        var removeBtn = document.getElementById("removeBtn");
        var popBtn = document.getElementById("popBtn");
        
        var arrayWrapper = document.getElementById("arrayWrapper");
        var listWrapper = document.getElementById("listWrapper");
        var codeLog = document.getElementById("codeLog");

        appendInput.addEventListener("keydown", function(e) { if (e.key === "Enter") appendAction(); });
        insertInput.addEventListener("keydown", function(e) { if (e.key === "Enter") insertAction(); });
        removeInput.addEventListener("keydown", function(e) { if (e.key === "Enter") removeAction(); });

        appendBtn.addEventListener("click", appendAction);
        insertBtn.addEventListener("click", insertAction);
        removeBtn.addEventListener("click", removeAction);
        popBtn.addEventListener("click", popAction);

        function appendAction() {
            var value = appendInput.value.trim();
            if (value === "") { alert("값을 입력해 주세요."); return; }
            var displayValue = isNaN(value) ? '"' + value + '"' : value;
            var valueClass = isNaN(value) ? 'string' : 'number';

            logCode('<span class="variable">my_list</span>.<span class="method">append</span><span class="bracket">(</span><span class="' + valueClass + '">' + displayValue + '</span><span class="bracket">)</span>');
            listData.push({ value: value, type: 'normal', insertIndex: -1 });
            renderAll();
            appendInput.value = "";
            appendInput.focus();
        }

        function insertAction() {
            var idx = parseInt(insertIdx.value, 10);
            var value = insertInput.value.trim();
            if (isNaN(idx) || idx < 0) { alert("올바른 인덱스를 입력하세요."); return; }
            if (value === "") { alert("값을 입력하세요."); return; }

            if (idx > listData.length) { 
                alert("현재 크기를 초과한 인덱스입니다!\n넣을 수 있는 최대 인덱스는 [" + listData.length + "] 입니다."); 
                insertIdx.value = listData.length;
                return; 
            }

            var displayValue = isNaN(value) ? '"' + value + '"' : value;
            var valueClass = isNaN(value) ? 'string' : 'number';

            logCode('<span class="variable">my_list</span>.<span class="method">insert</span><span class="bracket">(</span><span class="number">' + idx + '</span><span class="bracket">, </span><span class="' + valueClass + '">' + displayValue + '</span><span class="bracket">)</span>');
            listData.splice(idx, 0, { value: value, type: 'inserted', insertIndex: idx });
            renderAll();
            insertInput.value = "";
            insertInput.focus();
        }

        function removeAction() {
            var value = removeInput.value.trim();
            if (value === "") { alert("지울 값을 입력하세요."); return; }
            var displayValue = isNaN(value) ? '"' + value + '"' : value;
            var valueClass = isNaN(value) ? 'string' : 'number';

            logCode('<span class="variable">my_list</span>.<span class="method">remove</span><span class="bracket">(</span><span class="' + valueClass + '">' + displayValue + '</span><span class="bracket">)</span>');
            
            var targetIdx = -1;
            for(var i=0; i<listData.length; i++) {
                if(listData[i].value === value) {
                    targetIdx = i;
                    break;
                }
            }

            if (targetIdx !== -1) {
                listData.splice(targetIdx, 1);
                listData.forEach(function(item, i) {
                    if(item.type === 'inserted') item.insertIndex = i;
                });
                renderAll();
            } else {
                logCode('<span class="comment"># ValueError: list.remove(x): x not in list</span>');
                alert("값이 리스트에 없습니다.");
            }
            removeInput.value = "";
            removeInput.focus();
        }

        function popAction() {
            logCode('<span class="variable">my_list</span>.<span class="method">pop</span><span class="bracket">()</span>');
            if (listData.length > 0) {
                listData.pop();
                renderAll();
            } else {
                logCode('<span class="comment"># IndexError: pop from empty list</span>');
                alert("이미 비어 있습니다.");
            }
        }

        function logCode(htmlContent) {
            var newLine = document.createElement("div");
            newLine.className = "code-line";
            newLine.innerHTML = htmlContent;
            codeLog.appendChild(newLine);
            codeLog.scrollTop = codeLog.scrollHeight;
        }

        function renderAll() {
            var maxIdx = listData.length;
            insertLabel.innerText = "2. 원하는 위치에 끼워넣기 (Insert) - 범위: [0] ~ [" + maxIdx + "]";
            insertIdx.value = maxIdx;

            if (listData.length === 0) {
                arrayWrapper.innerHTML = '<div class="empty-msg">데이터가 없습니다.</div>';
                listWrapper.innerHTML = '<div class="empty-msg">데이터가 없습니다.</div>';
                return;
            }

            var arrayHtml = '<div class="array-content">';
            for (var i = 0; i < listData.length; i++) {
                arrayHtml += '<div class="array-item">' +
                             '  <div class="array-box">' + listData[i].value + '</div>' +
                             '  <div class="array-idx">[' + i + ']</div>' +
                             '</div>';
            }
            arrayHtml += '</div>';
            arrayWrapper.innerHTML = arrayHtml;

            var outerContainer = document.createElement('div');
            outerContainer.className = 'list-outer-container';

            var mainRow = document.createElement('div');
            mainRow.className = 'list-row-main';

            var insertedRow = document.createElement('div');
            insertedRow.className = 'list-row-inserted';

            var spaceWidth = '192px';

            for (var i = 0; i < listData.length; i++) {
                var current = listData[i];
                var isHead = (i === 0) ? '<div class="head-badge">Head</div>' : '';
                var nextTargetName = (i === listData.length - 1) ? "None" : "Node " + (i + 1);

                if (current.type === 'normal') {
                    var nodeHtml = document.createElement('div');
                    nodeHtml.className = 'list-node';
                    nodeHtml.innerHTML = '<div class="node-data">' + current.value + '</div>' +
                                         '<div class="node-next">' + isHead + '<div>next:</div><div style="color:#2b8a3e; font-weight:bold;">' + nextTargetName + '</div></div>';
                    mainRow.appendChild(nodeHtml);

                    if (i < listData.length - 1) {
                        var nextNode = listData[i+1];
                        if (nextNode.type === 'inserted') {
                            var arrowDown = document.createElement('div');
                            arrowDown.className = 'arrow-box-down';
                            arrowDown.innerHTML = '<div class="arrow-text">link</div><div style="transform: rotate(45deg); font-size: 26px;">➔</div>';
                            mainRow.appendChild(arrowDown);
                        } else {
                            var arrow = document.createElement('div');
                            arrow.className = 'arrow';
                            arrow.innerText = '➔';
                            mainRow.appendChild(arrow);
                        }
                    }
                    
                    var dummy = document.createElement('div');
                    dummy.style.width = spaceWidth;
                    insertedRow.appendChild(dummy);

                } else {
                    var insertedNodeHtml = document.createElement('div');
                    insertedNodeHtml.className = 'list-node inserted-node';
                    insertedNodeHtml.innerHTML = '<div class="node-data">' + current.value + '</div>' +
                                                 '<div class="node-next">' + isHead + '<div>next:</div><div style="color:#2b8a3e; font-weight:bold;">' + nextTargetName + '</div></div>';
                    insertedRow.appendChild(insertedNodeHtml);

                    if (i < listData.length - 1) {
                        var nextNode = listData[i+1];
                        // [수정] 자바스크립트의 타입 판별 로직을 분기처리하여 꼬임 방지
                        if (nextNode && nextNode.type === 'inserted') {
                            var arrowRight = document.createElement('div');
                            arrowRight.className = 'arrow inserted-flat-arrow';
                            arrowRight.innerText = '➔';
                            insertedRow.appendChild(arrowRight);
                        } else {
                            var arrowUp = document.createElement('div');
                            arrowUp.className = 'arrow-box-up';
                            arrowUp.innerHTML = '<div class="arrow-text">link</div><div style="transform: rotate(-45deg); font-size: 26px;">➔</div>';
                            insertedRow.appendChild(arrowUp);
                        }
                    }

                    var dummyMain = document.createElement('div');
                    dummyMain.style.width = spaceWidth;
                    mainRow.appendChild(dummyMain);
                }
            }

            outerContainer.appendChild(mainRow);
            outerContainer.appendChild(insertedRow);
            
            listWrapper.innerHTML = '';
            listWrapper.appendChild(outerContainer);
        }
    </script>
</body>
</html>
